services:
  postgres:
    image: postgres:16-alpine
    container_name: watchlist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: watchlist
      POSTGRES_PASSWORD: watchlist
      POSTGRES_DB: watchlist
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchlist -d watchlist"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: watchlist-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: watchlist-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      PORT: 3000
      JWT_SECRET: dev-secret
      DATABASE_URL: postgresql://watchlist:watchlist@postgres:5432/watchlist?schema=public
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM: no-reply@watchlist.dev
      FRONTEND_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    container_name: watchlist-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"

volumes:
  postgres_data:
